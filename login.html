<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{ 
    font-family:Arial; 
    background:#ded4a6; 
    display:flex; 
    justify-content:center; 
    align-items:center; 
    height:100vh;
    margin:0;
}
.container{
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.25); 
    padding:30px; 
    border-radius:10px;
    box-shadow:0 6px 20px rgba(0,0,0,0.2);
    backdrop-filter:blur(12px); 
    border:1px solid rgba(255,255,255,0.3);
    box-sizing: border-box;
}
input{
    width:100%;
    padding:10px;
    margin:10px 0; 
    border-radius:5px; 
    border:1px solid #ccc;
    box-sizing: border-box;
}
button{
    padding:10px;
    width:100%; 
    background:#2196F3;
    color:white;
    border:none;
    border-radius:5px; 
    cursor:pointer;
    font-weight: bold;
}
a{ 
    display:block; 
    margin-top:10px; 
    text-align: center;
}
</style>
</head>
<body>
<div class="container">
<h2>Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<a href="signup.html">Create new account</a>
</div>

<script>
function login(){
const username = document.getElementById("username").value.trim();
const password = document.getElementById("password").value.trim();

const users = JSON.parse(localStorage.getItem("users") || "[]");
const userFound = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);

if(userFound){
    // Track who is currently logged in
    localStorage.setItem("currentUser", username);
    window.location.href="index.html";
} else {
    const oldMsg=document.getElementById("msg"); if(oldMsg) oldMsg.remove();
    document.querySelector(".container").insertAdjacentHTML("beforeend", "<p id='msg' style='color:red;text-align:center;'>Invalid Username or Password</p>");
}
}
</script>
</body>
</html>
